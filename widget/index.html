<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pan Oběd</title>
  <link rel="stylesheet" href="chat.css">
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-58NV2R9');</script>
  <!-- End Google Tag Manager -->
</head>
<body>

  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-logo">
        <span class="logo-icon">🍽️</span>
        <div>
          <strong>Pan Oběd</strong>
          <small>Průvodce obědem</small>
        </div>
      </div>

      <nav id="sidebar-nav">
        <p class="nav-label">Rychlé dotazy</p>
        <button class="nav-btn" data-query="Dnešní menu v Pardubicích">🗓️ Dnešní menu v Pardubicích</button>
        <button class="nav-btn" data-query="Zítřejší menu v Pardubicích">📅 Zítřejší menu v Pardubicích</button>
        <button class="nav-btn" data-query="Které restaurace mají dnes v Pardubicích tradiční česká jídla jako svíčková, guláš nebo řízek?">🍖 Tradiční česká jídla</button>
        <button class="nav-btn" data-query="Kde si mohu dát na oběd sladké jídlo?">🍰 Sladké jídlo</button>

        <p class="nav-label" id="popular-label" style="display:none; margin-top:16px;">Nejhledanější dotazy</p>
        <div id="popular-queries"></div>
      </nav>

      <div id="sidebar-footer">
        <button id="new-chat-btn">＋ Nová konverzace</button>
      </div>
    </aside>

    <!-- Hlavní chat -->
    <main id="chat-main">

      <header id="chat-header">
        <button id="sidebar-toggle">☰</button>
        <span>Pan Oběd</span>
      </header>

      <div id="chat-messages"></div>

      <div id="chat-input-row">
        <input
          id="chat-input"
          type="text"
          placeholder="Napiš dotaz, např. Co mají dnes v Pardubicích?"
          autocomplete="off"
        />
        <button id="chat-send">Odeslat</button>
      </div>

    </main>

  </div>

  <script src="chat.js"></script>
</body>
</html>
