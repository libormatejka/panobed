# Produkční přepsání – porty dostupné jen z localhostu (přes Caddy)
# Použití: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  backend:
    ports:
      - "127.0.0.1:3000:3000"

  sqlite-web:
    # sqlite-web dostupný jen přes SSH tunel: ssh -L 8081:localhost:8081 user@server
    ports:
      - "127.0.0.1:8081:8080"
