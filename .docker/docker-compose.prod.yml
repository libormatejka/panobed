# Produkční přepsání
# Porty 3000 a 8081 jsou chráněny UFW firewallem (deny zvenku).
# Docker Compose merge přidává port bindings, proto zde žádné port overrides nejsou.
# Přístup k sqlite-web přes SSH tunel: ssh -L 8081:localhost:8081 user@server
services:
  backend:
    restart: always

  sqlite-web:
    restart: always
